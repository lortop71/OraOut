<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeCalc Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --bg-color: #f8f9fa;
        }
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation; /* Migliora la reattività al tocco */
        }
        .main-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        /* Input tempo stilizzato per Mobile */
        .time-input-big {
            font-size: 2rem !important;
            font-weight: 700;
            text-align: center;
            border: 2px solid #eee;
            border-radius: 16px;
            padding: 10px;
            background: #fff;
        }
        .time-input-big:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }
        /* Pulsanti di controllo grandi */
        .btn-step {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .btn-step:active {
            transform: scale(0.92);
        }
        .result-display {
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            color: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }
    </style>
</head>
<body class="py-4">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                
                <div class="card main-card">
                    <div class="card-body p-4">
                        <h5 class="text-center text-muted fw-bold mb-4">CALCOLA ORARIO USCITA NEW</h5>
                        
                        <div class="text-center mb-4">
                            <label class="form-label small text-uppercase fw-bold text-secondary">Ora di ingresso</label>
                            
                            <div class="d-flex align-items-center justify-content-between gap-2">
                                <button class="btn btn-light btn-step shadow-sm" onclick="adjustTime(-30)">
                                    <i class="bi bi-dash-lg"></i>
                                </button>
                                
                                <input type="time" id="startTime" class="form-control time-input-big shadow-sm" oninput="calculate()">
                                
                                <button class="btn btn-light btn-step shadow-sm" onclick="adjustTime(30)">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                            <div class="mt-2">
                                <button class="btn btn-link btn-sm text-decoration-none" onclick="setToNow()">
                                    <i class="bi bi-geo-alt-fill"></i> Usa ora attuale
                                </button>
                            </div>
                        </div>

                        <div class="result-display text-center shadow">
                            <div class="small text-uppercase opacity-75 mb-1">Tra 7 ore e 42 minuti</div>
                            <div id="future-time" class="display-2 fw-bold">--:--</div>
                        </div>

                        <div class="row g-2 mt-3">
                            <div class="col-6">
                                <button class="btn btn-outline-secondary w-100 rounded-pill btn-sm" onclick="adjustTime(-60)">-1 ora</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-secondary w-100 rounded-pill btn-sm" onclick="adjustTime(60)">+1 ora</button>
                            </div>
                        </div>

                    </div>
                </div>
                
                <p class="text-center mt-4 text-muted small">
                    Ottimizzato per l'uso con una sola mano.
                </p>

            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('startTime');
        const display = document.getElementById('future-time');

        // Funzione principale di calcolo
        function calculate() {
            const val = input.value;
            if (!val) return;

            const [h, m] = val.split(':').map(Number);
            let date = new Date();
            date.setHours(h, m, 0);

            // Aggiunta 7h 42m
            date.setMinutes(date.getMinutes() + (7 * 60) + 42);

            const resH = date.getHours().toString().padStart(2, '0');
            const resM = date.getMinutes().toString().padStart(2, '0');

            display.textContent = `${resH}:${resM}`;
        }

        // Imposta l'ora attuale
        function setToNow() {
            const now = new Date();
            input.value = now.getHours().toString().padStart(2, '0') + ":" + 
                          now.getMinutes().toString().padStart(2, '0');
            calculate();
        }

        // Modifica l'orario tramite pulsanti (+/- minuti)
        function adjustTime(minutes) {
            const [h, m] = input.value.split(':').map(Number);
            let date = new Date();
            date.setHours(h, m + minutes);
            
            input.value = date.getHours().toString().padStart(2, '0') + ":" + 
                          date.getMinutes().toString().padStart(2, '0');
            calculate();
        }

        // Inizializzazione
        window.onload = setToNow;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
